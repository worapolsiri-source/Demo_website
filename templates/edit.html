<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Edit Food - Food Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #f0ad4e; font-size: 24px; text-align: center; margin-bottom: 25px; }
        label { font-size: 14px; color: #666; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Kanit'; font-size: 15px; }
        input:focus, select:focus { border-color: #f0ad4e; outline: none; background-color: #fffdf9; }
        button { width: 100%; padding: 12px; background: #f0ad4e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #ec971f; transform: translateY(-2px); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #f0ad4e; }
    </style>
</head>
<body>
    <div class="form-card">
        <h1>📝 Edit Food Data</h1>
        <form method="POST">
            <label>ชื่ออาหาร</label>
            <input type="text" name="name" value="{{ food.name }}" required>
            
            <label>ราคา (บาท)</label>
            <input type="number" name="price" value="{{ food.price }}" step="0.01" required>
            
            <label>จำนวนในสต็อก</label>
            <input type="number" name="stock" value="{{ food.stock }}" required>
            
            <label>ลิงก์รูปภาพ (Direct Link URL)</label>
            <input type="text" name="image" value="{{ food.image }}" required>
            
            <label>หมวดหมู่</label>
            <select name="category_id">
                {% for c in categories %}
                    <option value="{{ c.id }}" {% if c.id == food.category_id %}selected{% endif %}>
                        {{ c.name }}
                    </option>
                {% endfor %}
            </select>

            <label>หน่วยนับ</label>
            <select name="unit_id">
                {% for u in units %}
                    <option value="{{ u.id }}" {% if u.id == food.unit_id %}selected{% endif %}>
                        {{ u.name }}
                    </option>
                {% endfor %}
            </select>

            <button type="submit">Update Changes</button>
        </form>
        <a href="/" class="back-link">← Cancel and Back</a>
    </div>
</body>
</html>
