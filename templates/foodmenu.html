<!DOCTYPE html>
<html>
<head>
    <title>Food Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #d9534f; border-bottom: 2px solid #d9534f; padding-bottom: 10px; }
        .btn-add { display: inline-block; background: #5cb85c; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; transition: 0.3s; margin-bottom: 20px; }
        .btn-add:hover { background: #449d44; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; overflow: hidden; border-radius: 10px; }
        th { background-color: #d9534f; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #fff5f5; }
        img { border-radius: 8px; object-fit: cover; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .action-links a { text-decoration: none; font-weight: bold; }
        .edit { color: #f0ad4e; }
        .delete { color: #d9534f; margin-left: 10px; }
        .stock-tag { background: #eee; padding: 2px 8px; border-radius: 10px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍴 Food Shop Menu</h1>
        <a href="/append" class="btn-add">+ Add New Food Item</a>
        
        <table>
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Food Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for f in foods %}
                <tr>
                    <td><img src="{{ f.image }}" width="100" height="70"></td>
                    <td><strong>{{ f.name }}</strong></td>
                    <td><span style="color: #666;">{{ f.cat_name }}</span></td>
                    <td><b style="color: #d9534f;">{{ f.price }} ฿</b></td>
                    <td><span class="stock-tag">{{ f.stock }} {{ f.unit_name }}</span></td>
                    <td class="action-links">
                        <a href="/edit/{{ f.id }}" class="edit">Edit</a>
                        <a href="/delete/{{ f.id }}" class="delete" onclick="return confirm('Delete this menu?')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
